<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Kitap Okuma Sayacı</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">   

    <!-- Üçüncü parti kütüphane -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- CSS modülleri -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/forms-buttons.css">
    <link rel="stylesheet" href="css/cards-metrics.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/autocomplete.css">
    <link rel="stylesheet" href="css/status-loader.css">
    <link rel="stylesheet" href="css/book-list.css">
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>📖 Kitap Sayacı</h1>
        <button class="theme-toggle" aria-label="Temayı değiştir">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="4.5"></circle>
            <g class="ray">
                <line x1="12" y1="1.5" x2="12" y2="4"></line>
                <line x1="12" y1="20" x2="12" y2="22.5"></line>
                <line x1="1.5" y1="12" x2="4" y2="12"></line>
                <line x1="20" y1="12" x2="22.5" y2="12"></line>
                <line x1="4.2" y1="4.2" x2="6" y2="6"></line>
                <line x1="18" y1="18" x2="19.8" y2="19.8"></line>
                <line x1="4.2" y1="19.8" x2="6" y2="18"></line>
                <line x1="18" y1="6" x2="19.8" y2="4.2"></line>
            </g>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 14.5c-1 .3-2 .5-3 .5-5 0-9-4-9-9 0-1 .2-2 .5-3C4.9 4.3 2 8.3 2 13c0 5 4 9 9 9 4.7 0 8.7-2.9 10.1-6.9-.3.2-.7.3-1.1.4z"></path>
        </svg>
        </button>
    </div>

    <div class="layout">
        <div class="content">

            <div id="panel-add" class="panel active">
                <h2 class="section-title">Yeni Kitap</h2>

                <div class="card">
                    <div class="card-title">📖 Kitap Ara</div>
                    <div class="form-group">
                        <label>Kitap Adı</label>
                        <div class="flex-row">
                            <input type="text" id="new-book-title" placeholder="Örn: Simyacı, 1984…" style="flex:1" autocomplete="off">
                            <button class="btn btn-primary btn-sm" id="search-btn">
                                <span id="search-btn-txt">🔍</span>
                                <span id="search-loader" class="loader" style="display:none"></span>
                            </button>
                        </div>
                    </div>
                    <div id="search-status" class="status-msg"></div>

                    <div id="edition-section" style="display:none">
                        <div class="card-title">Baskı Seç</div>
                        <div id="edition-list"></div>

                        <div class="divider">veya manuel giriş</div>

                        <div class="manual-section" id="manual-section">
                            <div class="manual-section-label">Baskım listede yok</div>

                            <div class="form-group" style="margin-bottom:12px">
                                <label>Sayfa Sayısı</label>
                                <input type="number" id="manual-page-override" placeholder="Örn: 384" min="1" autocomplete="off">
                            </div>

                            <div class="form-group" style="margin-bottom:0">
                                <label>Yazar <span style="color:var(--muted);font-weight:400">(opsiyonel)</span></label>
                                <div class="author-input-wrap">
                                    <input
                                        type="text"
                                        id="manual-author-input"
                                        placeholder="Yazar adı yaz, öneriler gelecek…"
                                        autocomplete="off"
                                        spellcheck="false"
                                    >
                                    <div class="author-suggestions" id="author-suggestions"></div>
                                </div>
                            </div>
                        </div>

                        <div style="display:flex;gap:10px;margin-top:16px">
                            <button class="btn btn-primary" id="confirm-edition-btn" style="flex:1">Devam Et ›</button>
                            <button class="btn btn-outline btn-sm" id="cancel-edition-btn">İptal</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">📚 Kitaplarım</div>
                    <div id="sidebar-books-list-mobile" class="mobile-book-list"></div>
                </div>

                <div class="card">
                    <div class="card-title">📅 Bu Hafta</div>
                    <div class="calendar-grid" id="week-strip"></div>
                    <div class="grid-3" style="margin-top:14px">
                        <div class="metric"><div class="metric-val" id="week-avg">0</div><div class="metric-lbl">Günlük Ortalama</div></div>
                        <div class="metric"><div class="metric-val" id="week-total">0</div><div class="metric-lbl">Bu Hafta Sayfa</div></div>
                        <div class="metric"><div class="metric-val" id="week-active">0</div><div class="metric-lbl">Aktif Kitap</div></div>
                    </div>
                </div>
            </div>

            <div id="panel-profile" class="panel">
                <h2 class="section-title">Profilim</h2>
                <div class="grid-3" style="margin-bottom:16px">
                    <div class="metric"><div class="metric-val" id="stat-total-books">0</div><div class="metric-lbl">Aktif Kitap</div></div>
                    <div class="metric"><div class="metric-val" id="stat-finished">0</div><div class="metric-lbl">Bitirilen</div></div>
                    <div class="metric"><div class="metric-val" id="stat-total-pages">0</div><div class="metric-lbl">Okunan Sayfa</div></div>
                </div>
                <div class="card">
                    <div class="card-title">📊 Haftalık Ortalama (sayfa/gün)</div>
                    <div class="chart-container"><canvas id="chart-weekly"></canvas></div>
                </div>
                <div class="card">
                    <div class="card-title">📈 Aylık Ortalama</div>
                    <div class="chart-container"><canvas id="chart-monthly"></canvas></div>
                </div>
                <div class="card">
                    <div class="card-title">✅ Bitirilen Kitaplar</div>
                    <div class="flex-row" style="margin-bottom:12px">
                        <input id="finished-input" placeholder="Kitap adı ara…" style="flex:1" autocomplete="off">
                        <button class="btn btn-primary btn-sm" id="add-finished-btn">
                            <span id="fin-btn-txt">+ Ekle</span>
                            <span id="fin-loader" class="loader" style="display:none"></span>
                        </button>
                    </div>
                    <div id="fin-status" class="status-msg"></div>
                    <div id="finished-list"></div>
                </div>
            </div>

            <div id="panel-book-detail" class="panel"></div>

        </div>
    </div>

    <div class="bottom-tab-bar">
        <button class="mobile-tab-btn active" data-panel="panel-add">
            <span class="tab-icon">➕</span><span>Yeni</span>
        </button>
        <button class="mobile-tab-btn" data-panel="panel-profile">
            <span class="tab-icon">👤</span><span>Profil</span>
        </button>
        <button class="mobile-tab-btn" data-panel="panel-book-detail" id="book-detail-tab" style="display:none">
            <span class="tab-icon">📘</span><span>Kitap</span>
        </button>
    </div>
</div>

<!-- TÜM script'ler NORMAL olarak yüklenir (module yok!) -->
<script src="js/01-state.js"></script>
<script src="js/02-utils.js"></script>
<script src="js/03-google-books-api.js"></script>
<script src="js/04-author-autocomplete.js"></script>
<script src="js/05-book-search.js"></script>
<script src="js/06-continue-reading.js"></script>
<script src="js/07-start-book-modal.js"></script>
<script src="js/08-book-crud.js"></script>
<script src="js/09-averages.js"></script>
<script src="js/10-book-list.js"></script>
<script src="js/11-book-detail.js"></script>
<script src="js/12-page-save.js"></script>
<script src="js/13-charts.js"></script>
<script src="js/14-calendar.js"></script>
<script src="js/15-profile.js"></script>
<script src="js/16-finished-book.js"></script>
<script src="js/17-tabs.js"></script>
<script src="js/week-widget.js"></script>
<script src="js/18-main.js"></script>
<script src="js/theme-toggle.js"></script>
</body>
</html>
