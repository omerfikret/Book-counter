<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Kitap Okuma Sayacı</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #f8f7f4;
            --surface: #ffffff;
            --border: rgba(0,0,0,0.08);
            --text: #1a1a1a;
            --muted: #6b6b6b;
            --accent: #2d6a4f;
            --accent-light: #e8f5e9;
            --accent2: #1b4332;
            --danger: #c0392b;
            --radius: 16px;
            --shadow: 0 4px 12px rgba(0,0,0,0.04);
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        /* ── Header ─────────────────────────────────────── */
        .header {
            background: var(--accent2);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .header h1 { font-size: 1.15rem; font-weight: 600; }
        .header-date { font-size: 0.7rem; opacity: 0.85; }

        /* ── Layout ─────────────────────────────────────── */
        .layout { display: flex; flex-direction: column; min-height: calc(100vh - 56px); }
        .content { flex: 1; padding: 18px 16px 100px 16px; overflow-y: auto; }

        /* ── Bottom Tab Bar ─────────────────────────────── */
        .bottom-tab-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            z-index: 110;
        }
        .mobile-tab-btn {
            background: transparent;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            padding: 8px 16px;
            border-radius: 30px;
            transition: all 0.2s;
            cursor: pointer;
            font-family: inherit;
        }
        .mobile-tab-btn .tab-icon { font-size: 22px; }
        .mobile-tab-btn.active { color: var(--accent); background: var(--accent-light); font-weight: 600; }

        /* ── Panels ─────────────────────────────────────── */
        .panel { display: none; animation: fadeIn 0.2s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* ── Typography / Spacing ───────────────────────── */
        .section-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 20px; color: var(--accent2); }

        /* ── Card ───────────────────────────────────────── */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .card-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--muted);
            letter-spacing: 0.5px;
            margin-bottom: 14px;
        }

        /* ── Form ───────────────────────────────────────── */
        .form-group { margin-bottom: 14px; }
        .form-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 6px;
            display: block;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            background: var(--bg);
            font-family: inherit;
            font-size: 15px;
            transition: all 0.2s;
            color: var(--text);
            -webkit-appearance: none;
        }
        input:focus { outline: none; border-color: var(--accent); background: white; }

        /* ── Buttons ────────────────────────────────────── */
        .btn {
            padding: 11px 18px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.18s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
            font-family: inherit;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:active { transform: scale(0.97); opacity: 0.9; }
        .btn-outline { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); }
        .btn-sm { padding: 8px 14px; font-size: 13px; }

        /* ── Helpers ────────────────────────────────────── */
        .flex-row { display: flex; gap: 10px; flex-wrap: nowrap; align-items: center; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        /* ── Metric ─────────────────────────────────────── */
        .metric { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 14px 6px; text-align: center; }
        .metric-val { font-size: 26px; font-weight: 800; color: var(--accent2); }
        .metric-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }

        /* ── Progress ───────────────────────────────────── */
        .progress-bar-wrap { background: var(--bg); border-radius: 30px; height: 8px; overflow: hidden; margin-top: 10px; }
        .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 30px; transition: width 0.25s ease; }

        /* ── Badge ──────────────────────────────────────── */
        .badge { display: inline-block; padding: 4px 12px; border-radius: 40px; font-size: 11px; font-weight: 600; }
        .badge-green  { background: var(--accent-light); color: var(--accent2); }
        .badge-orange { background: #fff3e0; color: #e67e22; }
        .badge-blue   { background: #e3f2fd; color: #1565c0; }

        /* ── Calendar ───────────────────────────────────── */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 12px; }
        .cal-day-name { text-align: center; font-size: 11px; font-weight: 600; color: var(--muted); padding: 5px 0; }
        .cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 40px; background: var(--bg); }
        .cal-cell.has-read { background: var(--accent-light); color: var(--accent2); font-weight: 700; }
        .cal-cell.today { border: 2px solid var(--accent); font-weight: 800; }
        .cal-cell.empty { background: transparent; }

        /* ── Edition Card ───────────────────────────────── */
        .edition-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: 16px;
            background: var(--bg);
            width: 100%;
            text-align: left;
            margin-bottom: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }
        .edition-card:active { transform: scale(0.98); }
        .edition-card.selected { border-color: var(--accent); background: var(--accent-light); }
        .edition-cover {
            width: 44px; height: 60px;
            background: #d4e8d4;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .edition-cover img { width: 100%; height: 100%; object-fit: cover; }
        .edition-radio {
            width: 18px; height: 18px;
            border: 2px solid var(--border);
            border-radius: 50%;
            flex-shrink: 0;
            margin-left: auto;
            transition: all 0.15s;
            display: flex; align-items: center; justify-content: center;
        }
        .edition-card.selected .edition-radio {
            border-color: var(--accent);
            background: var(--accent);
        }
        .edition-card.selected .edition-radio::after {
            content: '';
            width: 7px; height: 7px;
            border-radius: 50%;
            background: white;
        }

        /* ── Manual Section ─────────────────────────────── */
        .manual-section {
            background: var(--bg);
            border: 1.5px dashed var(--border);
            border-radius: 16px;
            padding: 14px;
            margin-top: 4px;
            transition: border-color 0.2s;
        }
        .manual-section:focus-within { border-color: var(--accent); }
        .manual-section-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 10px;
        }

        /* ── Author Autocomplete ────────────────────────── */
        .author-input-wrap { position: relative; }
        .author-suggestions {
            position: absolute;
            top: calc(100% + 6px);
            left: 0; right: 0;
            background: var(--surface);
            border: 1.5px solid var(--accent);
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            z-index: 500;
            overflow: hidden;
            display: none;
        }
        .author-suggestions.visible { display: block; }
        .author-suggestion-item {
            padding: 12px 14px;
            cursor: pointer;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.12s;
        }
        .author-suggestion-item:last-child { border-bottom: none; }
        .author-suggestion-item:active,
        .author-suggestion-item:hover { background: var(--accent-light); }
        .author-suggestion-icon { font-size: 18px; flex-shrink: 0; }
        .author-suggestion-name { font-weight: 500; }
        .author-suggestion-books { font-size: 11px; color: var(--muted); }
        .author-loader-wrap {
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--muted);
        }

        /* ── Status ─────────────────────────────────────── */
        .status-msg { font-size: 12px; padding: 5px 0; color: var(--muted); min-height: 22px; }
        .status-msg.ok  { color: var(--accent); }
        .status-msg.err { color: var(--danger); }

        /* ── Loader ─────────────────────────────────────── */
        .loader { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Modal ──────────────────────────────────────── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
            padding: 16px;
        }
        .modal-card {
            background: var(--surface);
            border-radius: 28px;
            max-width: 480px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 22px;
        }

        /* ── Finished Book Row ──────────────────────────── */
        .finished-book { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--bg); border-radius: 16px; margin-bottom: 8px; }

        /* ── Chart ──────────────────────────────────────── */
        .chart-container { position: relative; height: 200px; width: 100%; margin-top: 8px; }

        /* ── Book List ──────────────────────────────────── */
        .mobile-book-list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
        .mobile-book-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .mobile-book-item:active { transform: scale(0.98); }
        .mobile-book-item.active { background: var(--accent-light); border-color: var(--accent); }
        .book-thumb-mob { width: 44px; height: 58px; background: var(--accent-light); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 28px; overflow: hidden; flex-shrink: 0; }
        .book-thumb-mob img { width: 100%; height: 100%; object-fit: cover; }
        .book-info-mob { flex: 1; min-width: 0; }
        .book-title-mob { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .book-progress-mob { font-size: 12px; color: var(--muted); margin-top: 2px; }

        /* Divider */
        .divider {
            display: flex; align-items: center; gap: 10px;
            color: var(--muted); font-size: 12px;
            margin: 12px 0;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <h1>📖 Kitap Sayacı</h1>
    <div id="header-date" class="header-date"></div>
</div>

<div class="layout">
    <div class="content">

        <!-- ── Panel: Yeni Kitap ──────────────────────── -->
        <div id="panel-add" class="panel active">
            <h2 class="section-title">➕ Yeni Kitap</h2>

            <div class="card">
                <div class="card-title">📖 Kitap Ara</div>
                <div class="form-group">
                    <label>Kitap Adı</label>
                    <div class="flex-row">
                        <input type="text" id="new-book-title" placeholder="Örn: Simyacı, 1984…" style="flex:1" autocomplete="off">
                        <button class="btn btn-primary btn-sm" id="search-btn">
                            <span id="search-btn-txt">🔍</span>
                            <span id="search-loader" class="loader" style="display:none"></span>
                        </button>
                    </div>
                </div>
                <div id="search-status" class="status-msg"></div>

                <!-- Baskı + Manuel Bölümü -->
                <div id="edition-section" style="display:none">
                    <div class="card-title">📚 Baskı Seç</div>
                    <div id="edition-list"></div>

                    <div class="divider">veya manuel giriş</div>

                    <!-- Manuel Bölüm -->
                    <div class="manual-section" id="manual-section">
                        <div class="manual-section-label">✏️ Baskım listede yok</div>

                        <!-- Sayfa Sayısı -->
                        <div class="form-group" style="margin-bottom:12px">
                            <label>Sayfa Sayısı</label>
                            <input type="number" id="manual-page-override" placeholder="Örn: 384" min="1" autocomplete="off">
                        </div>

                        <!-- Yazar - Autocomplete -->
                        <div class="form-group" style="margin-bottom:0">
                            <label>Yazar <span style="color:var(--muted);font-weight:400">(opsiyonel)</span></label>
                            <div class="author-input-wrap">
                                <input
                                    type="text"
                                    id="manual-author-input"
                                    placeholder="Yazar adı yaz, öneriler gelecek…"
                                    autocomplete="off"
                                    spellcheck="false"
                                >
                                <div class="author-suggestions" id="author-suggestions"></div>
                            </div>
                        </div>
                    </div>

                    <div style="display:flex;gap:10px;margin-top:16px">
                        <button class="btn btn-primary" id="confirm-edition-btn" style="flex:1">Devam Et ›</button>
                        <button class="btn btn-outline btn-sm" id="cancel-edition-btn">İptal</button>
                    </div>
                </div>
            </div>

            <!-- Kitap Listesi -->
            <div class="card">
                <div class="card-title">📚 Kitaplarım</div>
                <div id="sidebar-books-list-mobile" class="mobile-book-list"></div>
            </div>
        </div>

        <!-- ── Panel: Profil ──────────────────────────── -->
        <div id="panel-profile" class="panel">
            <h2 class="section-title">👤 Profilim</h2>
            <div class="grid-3" style="margin-bottom:16px">
                <div class="metric"><div class="metric-val" id="stat-total-books">0</div><div class="metric-lbl">Aktif Kitap</div></div>
                <div class="metric"><div class="metric-val" id="stat-finished">0</div><div class="metric-lbl">Bitirilen</div></div>
                <div class="metric"><div class="metric-val" id="stat-total-pages">0</div><div class="metric-lbl">Okunan Sayfa</div></div>
            </div>
            <div class="card">
                <div class="card-title">📊 Haftalık Ortalama (sayfa/gün)</div>
                <div class="chart-container"><canvas id="chart-weekly"></canvas></div>
            </div>
            <div class="card">
                <div class="card-title">📈 Aylık Ortalama</div>
                <div class="chart-container"><canvas id="chart-monthly"></canvas></div>
            </div>
            <div class="card">
                <div class="card-title">✅ Bitirilen Kitaplar</div>
                <div class="flex-row" style="margin-bottom:12px">
                    <input id="finished-input" placeholder="Kitap adı ara…" style="flex:1" autocomplete="off">
                    <button class="btn btn-primary btn-sm" id="add-finished-btn">
                        <span id="fin-btn-txt">+ Ekle</span>
                        <span id="fin-loader" class="loader" style="display:none"></span>
                    </button>
                </div>
                <div id="fin-status" class="status-msg"></div>
                <div id="finished-list"></div>
            </div>
        </div>

        <!-- ── Panel: Kitap Detay ─────────────────────── -->
        <div id="panel-book-detail" class="panel"></div>

    </div>
</div>

<!-- BOTTOM TAB BAR -->
<div class="bottom-tab-bar">
    <button class="mobile-tab-btn active" data-panel="panel-add">
        <span class="tab-icon">➕</span><span>Yeni</span>
    </button>
    <button class="mobile-tab-btn" data-panel="panel-profile">
        <span class="tab-icon">👤</span><span>Profil</span>
    </button>
    <button class="mobile-tab-btn" data-panel="panel-book-detail" id="book-detail-tab" style="display:none">
        <span class="tab-icon">📘</span><span>Kitap</span>
    </button>
</div>

<!-- ══════════════════════════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════════════════════════ -->
<script>
'use strict';

/* ════════════════════════════════════════════════════════════
   1. VERİ KATMANI
════════════════════════════════════════════════════════════ */
let STATE = (function() {
    try {
        const raw = localStorage.getItem('bookTracker_v3');
        return raw ? JSON.parse(raw) : { books: [], finishedBooks: [] };
    } catch(e) {
        return { books: [], finishedBooks: [] };
    }
})();

function saveState() {
    localStorage.setItem('bookTracker_v3', JSON.stringify(STATE));
}

/* ════════════════════════════════════════════════════════════
   2. YARDIMCILAR
════════════════════════════════════════════════════════════ */
function genId() {
    return 'book_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
}

function todayStr() {
    return new Date().toISOString().split('T')[0];
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function getWeekNumber(dateStr) {
    const d = new Date(dateStr);
    const jan4 = new Date(d.getFullYear(), 0, 4);
    const start = new Date(jan4);
    start.setDate(jan4.getDate() - ((jan4.getDay() || 7) - 1));
    const week = Math.floor((d - start) / (7 * 86400000)) + 1;
    return `${d.getFullYear()}-W${String(week).padStart(2, '0')}`;
}

function getMonthKey(ds) { return ds.slice(0, 7); }

function showStatus(id, msg, type) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.className = 'status-msg' + (type ? ' ' + type : '');
}

function setLoading(btnTxtId, loaderId, btnId, isLoading) {
    const btnTxt = document.getElementById(btnTxtId);
    const loader = document.getElementById(loaderId);
    const btn    = document.getElementById(btnId);
    if (btnTxt)  btnTxt.style.display  = isLoading ? 'none' : 'inline';
    if (loader)  loader.style.display  = isLoading ? 'inline-block' : 'none';
    if (btn)     btn.disabled          = isLoading;
}

/* ════════════════════════════════════════════════════════════
   3. GOOGLE BOOKS API
════════════════════════════════════════════════════════════ */

/** Baskıları getir */
async function fetchEditions(titleQuery) {
    const url = `https://www.googleapis.com/books/v1/volumes?q=intitle:${encodeURIComponent(titleQuery)}&maxResults=8&fields=items(volumeInfo/title,volumeInfo/authors,volumeInfo/pageCount,volumeInfo/publisher,volumeInfo/publishedDate,volumeInfo/language,volumeInfo/categories,volumeInfo/description,volumeInfo/imageLinks)`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    if (!data.items) return [];

    const seen = new Set();
    const editions = [];

    for (const item of data.items) {
        const v = item.volumeInfo;
        const pages     = v.pageCount || 0;
        const publisher = v.publisher || '';
        const year      = v.publishedDate ? v.publishedDate.slice(0, 4) : '';
        const key       = `${(v.title || '').toLowerCase()}|${publisher.toLowerCase()}|${year}`;
        if (seen.has(key)) continue;
        seen.add(key);
        editions.push({
            title:       v.title || titleQuery,
            author:      (v.authors && v.authors[0]) || '',
            pages,
            publisher,
            year,
            language:    v.language || '',
            coverUrl:    v.imageLinks?.thumbnail?.replace('http://', 'https://') || '',
            genre:       (v.categories && v.categories[0]) || 'Edebiyat',
            description: v.description ? v.description.slice(0, 180) + '…' : '',
        });
    }
    return editions;
}

/**
 * Yazar önerileri: kitap adını intr: ile ara, yazarları topla ve birleştir.
 * Ayrı bir "author:" sorgusu da at, sonuçları birleştir.
 * Döner: [{ name, bookCount, sampleBook }]
 */
async function fetchAuthorSuggestions(authorQuery) {
    if (!authorQuery || authorQuery.trim().length < 2) return [];

    const q = encodeURIComponent(authorQuery.trim());
    const url = `https://www.googleapis.com/books/v1/volumes?q=inauthor:${q}&maxResults=10&fields=items(volumeInfo/authors,volumeInfo/title)`;

    const res = await fetch(url);
    if (!res.ok) return [];
    const data = await res.json();
    if (!data.items) return [];

    // Yazarları say ve biriktir
    const authorMap = new Map(); // name -> { count, sampleBook }
    for (const item of data.items) {
        const v = item.volumeInfo;
        if (!v.authors) continue;
        for (const author of v.authors) {
            // Yalnızca sorguyla başlayanları göster (case-insensitive)
            if (!author.toLowerCase().includes(authorQuery.toLowerCase())) continue;
            if (!authorMap.has(author)) {
                authorMap.set(author, { count: 0, sampleBook: v.title || '' });
            }
            authorMap.get(author).count++;
        }
    }

    // Frekansa göre sırala
    return Array.from(authorMap.entries())
        .map(([name, info]) => ({ name, bookCount: info.count, sampleBook: info.sampleBook }))
        .sort((a, b) => b.bookCount - a.bookCount)
        .slice(0, 6);
}

/* ════════════════════════════════════════════════════════════
   4. YAZAR AUTOCOMPLETE
════════════════════════════════════════════════════════════ */
let authorDebounceTimer = null;
let authorSuggestionsVisible = false;

function initAuthorAutocomplete() {
    const input   = document.getElementById('manual-author-input');
    const box     = document.getElementById('author-suggestions');
    if (!input || !box) return;

    // Kullanıcı yazarken debounce ile API çağır
    input.addEventListener('input', () => {
        const val = input.value.trim();
        clearTimeout(authorDebounceTimer);
        hideAuthorSuggestions();

        if (val.length < 2) return;

        authorDebounceTimer = setTimeout(async () => {
            // Loading göster
            box.innerHTML = `
                <div class="author-loader-wrap">
                    <span class="loader"></span>
                    <span>Yazarlar aranıyor…</span>
                </div>`;
            showAuthorSuggestions();

            try {
                const suggestions = await fetchAuthorSuggestions(val);
                renderAuthorSuggestions(suggestions, input.value);
            } catch(e) {
                hideAuthorSuggestions();
            }
        }, 350); // 350ms bekle — ne çok hızlı ne çok yavaş
    });

    // Dışarı tıklayınca kapat
    document.addEventListener('click', (e) => {
        if (!input.contains(e.target) && !box.contains(e.target)) {
            hideAuthorSuggestions();
        }
    });

    // Escape ile kapat
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') hideAuthorSuggestions();
    });
}

function renderAuthorSuggestions(suggestions, rawQuery) {
    const input = document.getElementById('manual-author-input');
    const box   = document.getElementById('author-suggestions');

    if (suggestions.length === 0) {
        // Öneri yoksa yine de yazılanı kabul et — kutuyu kapat
        hideAuthorSuggestions();
        return;
    }

    box.innerHTML = suggestions.map(s => `
        <div class="author-suggestion-item" data-name="${escapeHtml(s.name)}">
            <span class="author-suggestion-icon">✍️</span>
            <div>
                <div class="author-suggestion-name">${highlightMatch(s.name, rawQuery)}</div>
                <div class="author-suggestion-books">${s.bookCount} kitap · ${escapeHtml(s.sampleBook)}</div>
            </div>
        </div>
    `).join('');

    // Seçim
    box.querySelectorAll('.author-suggestion-item').forEach(item => {
        item.addEventListener('mousedown', (e) => {
            // mousedown: blur'dan önce tetiklenir, input değerini korur
            e.preventDefault();
            const name = item.dataset.name;
            if (input) input.value = name;
            hideAuthorSuggestions();
        });
    });

    showAuthorSuggestions();
}

/** Sorguyla eşleşen kısmı bold yap */
function highlightMatch(text, query) {
    if (!query) return escapeHtml(text);
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx === -1) return escapeHtml(text);
    return escapeHtml(text.slice(0, idx))
        + `<strong>${escapeHtml(text.slice(idx, idx + query.length))}</strong>`
        + escapeHtml(text.slice(idx + query.length));
}

function showAuthorSuggestions() {
    const box = document.getElementById('author-suggestions');
    if (box) { box.classList.add('visible'); authorSuggestionsVisible = true; }
}

function hideAuthorSuggestions() {
    const box = document.getElementById('author-suggestions');
    if (box) { box.classList.remove('visible'); authorSuggestionsVisible = false; }
}

let foundEditions     = [];
let selectedEditionIdx = -1;

async function searchBook() {
    const title = (document.getElementById('new-book-title').value || '').trim();
    if (!title) { showStatus('search-status', '⚠ Kitap adı girin', 'err'); return; }

    setLoading('search-btn-txt', 'search-loader', 'search-btn', true);
    document.getElementById('edition-section').style.display = 'none';
    showStatus('search-status', 'Aranıyor…', '');

    try {
        foundEditions = await fetchEditions(title);
        if (foundEditions.length === 0) {
            showStatus('search-status', 'Baskı bulunamadı — manuel girebilirsiniz.', 'err');
        } else {
            showStatus('search-status', `${foundEditions.length} baskı bulundu, seçin.`, 'ok');
        }
        showEditionSection(foundEditions);
    } catch(e) {
        showStatus('search-status', '⚠ Hata: ' + e.message, 'err');
        showEditionSection([]);
    } finally {
        setLoading('search-btn-txt', 'search-loader', 'search-btn', false);
    }
}

function showEditionSection(editions) {
    selectedEditionIdx = -1;
    document.getElementById('manual-page-override').value  = '';
    document.getElementById('manual-author-input').value   = '';
    hideAuthorSuggestions();

    const listDiv = document.getElementById('edition-list');

    if (editions.length === 0) {
        listDiv.innerHTML = '<p style="font-size:13px;color:var(--muted);padding:8px 0">Baskı bulunamadı — aşağıdan manuel giriş yapabilirsiniz.</p>';
    } else {
        listDiv.innerHTML = editions.map((ed, i) => {
            const coverHtml = ed.coverUrl
                ? `<img src="${escapeHtml(ed.coverUrl)}" alt="kapak" onerror="this.parentElement.innerHTML='📖'">`
                : '📖';
            const meta = [ed.author, ed.publisher, ed.year, langLabel(ed.language)]
                .filter(Boolean).join(' · ');
            return `
                <button class="edition-card" data-idx="${i}">
                    <div class="edition-cover">${coverHtml}</div>
                    <div style="flex:1;min-width:0">
                        <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(ed.title)}</div>
                        <div style="font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(meta)}</div>
                        <div style="font-size:13px;font-weight:700;color:var(--accent2);margin-top:4px">${ed.pages > 0 ? ed.pages + ' sayfa' : '? sayfa'}</div>
                    </div>
                    <div class="edition-radio"></div>
                </button>`;
        }).join('');

        // Seçim
        listDiv.querySelectorAll('.edition-card').forEach(card => {
            card.addEventListener('click', () => {
                selectedEditionIdx = parseInt(card.dataset.idx);
                listDiv.querySelectorAll('.edition-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                // Baskı seçildi → manuel alanları sıfırla (kullanıcı isterse doldurur)
                document.getElementById('manual-page-override').value = '';
                document.getElementById('manual-author-input').value  = '';
                hideAuthorSuggestions();
            });
        });
    }

    document.getElementById('edition-section').style.display = 'block';
}

function langLabel(code) {
    const map = { tr:'Türkçe', en:'İngilizce', de:'Almanca', fr:'Fransızca', es:'İspanyolca', it:'İtalyanca', ru:'Rusça', ja:'Japonca', ar:'Arapça' };
    return map[code] || (code ? code.toUpperCase() : '');
}

/* ════════════════════════════════════════════════════════════
   6. DEVAM ET BUTONU — Baskı veya Manuel Bilgi Topla
════════════════════════════════════════════════════════════ */
document.getElementById('confirm-edition-btn').addEventListener('click', () => {
    const manualPages  = parseInt(document.getElementById('manual-page-override').value);
    const manualAuthor = (document.getElementById('manual-author-input').value || '').trim();
    const hasManualPages = !isNaN(manualPages) && manualPages > 0;
    const bookTitle    = (document.getElementById('new-book-title').value || '').trim();

    // Kural: ya baskı seçilmeli ya da manuel sayfa girilmeli
    if (selectedEditionIdx === -1 && !hasManualPages) {
        alert('Bir baskı seçin ya da sayfa sayısını kendiniz girin.');
        document.getElementById('manual-page-override').focus();
        return;
    }

    let bookInfo;

    if (hasManualPages) {
        // Manuel sayfa → yazarı da manual'dan al
        // Eğer baskı da seçildiyse onun bilgilerini taban al
        const base = selectedEditionIdx >= 0 ? foundEditions[selectedEditionIdx] : null;
        bookInfo = {
            title:       base ? base.title       : bookTitle,
            author:      manualAuthor || (base ? base.author : '') || 'Bilinmiyor',
            pages:       manualPages,
            genre:       base ? base.genre       : 'Belirtilmemiş',
            description: base ? base.description : '',
            coverUrl:    base ? base.coverUrl    : '',
        };
    } else {
        // Baskı seçildi, manuel sayfa girilmedi
        const ed = foundEditions[selectedEditionIdx];
        if (!ed.pages) {
            alert('Seçilen baskının sayfa sayısı bilinmiyor. Lütfen sayfa sayısını kendiniz girin.');
            document.getElementById('manual-page-override').focus();
            return;
        }
        bookInfo = {
            ...ed,
            // Kullanıcı yazar kutusuna bir şey yazdıysa onu tercih et
            author: manualAuthor || ed.author || 'Bilinmiyor',
        };
    }

    // Temizlik
    document.getElementById('edition-section').style.display = 'none';
    document.getElementById('manual-page-override').value    = '';
    document.getElementById('manual-author-input').value     = '';
    document.getElementById('new-book-title').value          = '';
    selectedEditionIdx = -1;
    foundEditions      = [];
    showStatus('search-status', '', '');
    hideAuthorSuggestions();

    showStartModal(bookInfo);
});

document.getElementById('cancel-edition-btn').addEventListener('click', () => {
    document.getElementById('edition-section').style.display = 'none';
    document.getElementById('manual-page-override').value    = '';
    document.getElementById('manual-author-input').value     = '';
    selectedEditionIdx = -1;
    foundEditions      = [];
    showStatus('search-status', '', '');
    hideAuthorSuggestions();
});

function showStartModal(bookInfo) {
    const existing = document.getElementById('start-modal');

    const modal = document.createElement('div');
    modal.id = 'start-modal';
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-card">
            <h3 style="font-size:1.3rem;font-weight:700;margin-bottom:4px">${escapeHtml(bookInfo.title)}</h3>
            <p style="margin:4px 0 16px;color:var(--muted);font-size:13px">
                ${escapeHtml(bookInfo.author)}${bookInfo.pages ? ' · ' + bookInfo.pages + ' sayfa' : ''}
            </p>
            <div style="display:flex;gap:10px;margin-bottom:16px">
                <button id="modal-new" class="btn btn-primary" style="flex:1">🆕 Yeni başlıyorum</button>
                <button id="modal-continue" class="btn btn-outline" style="flex:1">📑 Devam ediyorum</button>
            </div>
            <div id="modal-page-row" style="display:none;margin-bottom:18px">
                <label style="font-size:13px;font-weight:500;color:var(--muted);display:block;margin-bottom:6px">Hangi sayfadasınız?</label>
                <input type="number" id="modal-page-input" min="1" max="${bookInfo.pages || 9999}" placeholder="örn: 45">
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end">
                <button id="modal-cancel"  class="btn btn-outline btn-sm">İptal</button>
                <button id="modal-confirm" class="btn btn-primary btn-sm">Kitabı Ekle</button>
            </div>
        </div>`;
    document.body.appendChild(modal);

    let mode = 'new';
    document.getElementById('modal-new').style.background = 'var(--accent2)';

    document.getElementById('modal-new').onclick = () => {
        mode = 'new';
        document.getElementById('modal-page-row').style.display = 'none';
        document.getElementById('modal-new').style.background = 'var(--accent2)';
        document.getElementById('modal-continue').style.background = 'transparent';
    };
    document.getElementById('modal-continue').onclick = () => {
        mode = 'continue';
        document.getElementById('modal-page-row').style.display = 'block';
        document.getElementById('modal-continue').style.background = 'var(--accent-light)';
        document.getElementById('modal-new').style.background = 'transparent';
        document.getElementById('modal-page-input').focus();
    };
    document.getElementById('modal-cancel').onclick  = () => modal.remove();
    document.getElementById('modal-confirm').onclick = () => {
        let startPage = 0;
        if (mode === 'continue') {
            const inp = parseInt(document.getElementById('modal-page-input').value);
            if (!inp || inp < 1) {
                document.getElementById('modal-page-input').style.borderColor = 'var(--danger)';
                document.getElementById('modal-page-input').focus();
                return;
            }
            startPage = inp;
        }
        modal.remove();
        createBook({ ...bookInfo, startPage });
    };
    document.getElementById('modal-page-input')?.addEventListener('keypress', e => {
        if (e.key === 'Enter') document.getElementById('modal-confirm').click();
    });
    // Overlay tıklayınca kapat
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
}

/* ════════════════════════════════════════════════════════════
   9. ORTALAMA HESAPLAMA
════════════════════════════════════════════════════════════ */
function recalcAverages(book) {
    const weekBuckets = {};
    for (const [date, pages] of Object.entries(book.readLog)) {
        const wk = getWeekNumber(date);
        if (!weekBuckets[wk]) weekBuckets[wk] = [];
        weekBuckets[wk].push(pages);
    }
    book.weeklyAvgs = {};
    for (const [wk, arr] of Object.entries(weekBuckets)) {
        book.weeklyAvgs[wk] = Math.round(arr.reduce((a, b) => a + b, 0) / arr.length);
    }

    const monthBuckets = {};
    for (const [wk, avg] of Object.entries(book.weeklyAvgs)) {
        const [y, w] = wk.split('-W');
        const jan4   = new Date(parseInt(y), 0, 4);
        const mon    = new Date(jan4);
        mon.setDate(jan4.getDate() - ((jan4.getDay() || 7) - 1));
        mon.setDate(mon.getDate() + (parseInt(w) - 1) * 7);
        const mk = getMonthKey(mon.toISOString().slice(0, 10));
        if (!monthBuckets[mk]) monthBuckets[mk] = [];
        monthBuckets[mk].push(avg);
    }
    book.monthlyAvgs = {};
    for (const [mk, arr] of Object.entries(monthBuckets)) {
        book.monthlyAvgs[mk] = Math.round(arr.reduce((a, b) => a + b, 0) / arr.length);
    }
}

/* ════════════════════════════════════════════════════════════
   12. SAYFA KAYDETME
════════════════════════════════════════════════════════════ */
window.logPages = function(bookId) {
    const book = STATE.books.find(b => b.id === bookId);
    if (!book) return;
    const pages = parseInt(document.getElementById('pages-input').value);
    if (isNaN(pages) || pages <= 0) {
        showStatus('log-status', '⚠ Geçerli bir sayfa sayısı girin', 'err');
        return;
    }
    const today = todayStr();
    book.readLog[today] = (book.readLog[today] || 0) + pages;
    book.pagesRead = book.totalPages > 0
        ? Math.min(book.totalPages, book.pagesRead + pages)
        : book.pagesRead + pages;
    recalcAverages(book);
    saveState();
    showStatus('log-status', `✓ +${pages} sayfa kaydedildi — bugün toplam: ${book.readLog[today]}`, 'ok');
    document.getElementById('pages-input').value = '';
    openBookPanel(bookId);
    renderProfileCharts();
};

   13. GRAFİKLER
════════════════════════════════════════════════════════════ */
function renderBookChart(bookId) {
    const book   = STATE.books.find(b => b.id === bookId);
    const canvas = document.getElementById(`weekly-chart-${bookId}`);
    if (!book || !canvas) return;

    const today  = new Date();
    const dow    = today.getDay() || 7;
    const monday = new Date(today);
    monday.setDate(today.getDate() - dow + 1);

    const labels = ['Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt', 'Paz'];
    const data   = [];
    const colors = [];

    for (let i = 0; i < 7; i++) {
        const d  = new Date(monday);
        d.setDate(monday.getDate() + i);
        const ds = d.toISOString().split('T')[0];
        const p  = book.readLog[ds] || 0;
        data.push(p);
        colors.push(d.toDateString() === today.toDateString() ? '#1b4332' : '#52b788');
    }

    const key = `chart_${bookId}`;
    if (window[key]) window[key].destroy();
    window[key] = new Chart(canvas, {
        type: 'bar',
        data: { labels, datasets: [{ label: 'Sayfa', data, backgroundColor: colors, borderRadius: 8 }] },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, ticks: { font: { size: 11 } } }, x: { ticks: { font: { size: 11 } }, grid: { display: false } } }
        }
    });

    const avgDiv = document.getElementById(`week-avg-${bookId}`);
    if (avgDiv) {
        const weekTotal = data.reduce((a, b) => a + b, 0);
        const readDays  = data.filter(v => v > 0).length;
        const avg       = readDays > 0 ? Math.round(weekTotal / readDays) : 0;
        avgDiv.textContent = `Bu hafta: ${weekTotal} sayfa | Ort: ${avg} sayfa/gün (${readDays} gün)`;
    }
}

let weeklyChart = null, monthlyChart = null;

function renderProfileCharts() {
    // Haftalık
    const weeklyData = {};
    STATE.books.forEach(b => {
        Object.entries(b.readLog).forEach(([date, pages]) => {
            const wk = getWeekNumber(date);
            if (!weeklyData[wk]) weeklyData[wk] = [];
            weeklyData[wk].push(pages);
        });
    });
    const weeks  = Object.keys(weeklyData).sort();
    const wData  = weeks.map(w => Math.round(weeklyData[w].reduce((a, b) => a + b, 0) / weeklyData[w].length));

    if (weeklyChart) weeklyChart.destroy();
    const wCanvas = document.getElementById('chart-weekly');
    if (wCanvas) {
        weeklyChart = new Chart(wCanvas, {
            type: 'line',
            data: {
                labels: weeks.length ? weeks.map(w => w.slice(-2) + '. hf') : ['Veri yok'],
                datasets: [{
                    label: 'Ort. Sayfa/Gün',
                    data: wData.length ? wData : [0],
                    borderColor: '#2d6a4f',
                    backgroundColor: 'rgba(45,106,79,0.1)',
                    tension: 0.3,
                    fill: true,
                    pointBackgroundColor: '#1b4332',
                    pointRadius: 4,
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });
    }

    // Aylık
    const monthlyData = {};
    STATE.books.forEach(b => {
        Object.entries(b.monthlyAvgs || {}).forEach(([mk, avg]) => {
            if (!monthlyData[mk]) monthlyData[mk] = [];
            monthlyData[mk].push(avg);
        });
    });
    const months = Object.keys(monthlyData).sort();
    const TR_M   = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
    const mData  = months.map(mk => Math.round(monthlyData[mk].reduce((a, b) => a + b, 0) / monthlyData[mk].length));

    if (monthlyChart) monthlyChart.destroy();
    const mCanvas = document.getElementById('chart-monthly');
    if (mCanvas) {
        monthlyChart = new Chart(mCanvas, {
            type: 'bar',
            data: {
                labels: months.length ? months.map(mk => { const [y, m] = mk.split('-'); return `${TR_M[parseInt(m)-1]} ${y.slice(2)}`; }) : ['Veri yok'],
                datasets: [{ label: 'Ort. Sayfa/Gün', data: mData.length ? mData : [0], backgroundColor: '#52b788', borderRadius: 6 }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });
    }
}

/* ════════════════════════════════════════════════════════════
   14. TAKVİM
════════════════════════════════════════════════════════════ */
const calState = {};
const TR_MONTHS_LONG = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

function renderCalendar(bookId, year, month) {
    calState[bookId] = { year, month };
    const book      = STATE.books.find(b => b.id === bookId);
    const container = document.getElementById(`calendar-${bookId}`);
    const labelEl   = document.getElementById(`cal-label-${bookId}`);
    if (!book || !container) return;

    if (labelEl) labelEl.textContent = `${TR_MONTHS_LONG[month]} ${year}`;

    const firstDay = new Date(year, month, 1);
    const lastDay  = new Date(year, month + 1, 0);
    const today    = todayStr();
    const startPad = (firstDay.getDay() || 7) - 1;

    let html = '<div class="calendar-grid">';
    ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'].forEach(d => { html += `<div class="cal-day-name">${d}</div>`; });
    for (let i = 0; i < startPad; i++) html += '<div class="cal-cell empty"></div>';
    for (let d = 1; d <= lastDay.getDate(); d++) {
        const ds    = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const pages = book.readLog[ds] || 0;
        let   cls   = 'cal-cell';
        if (pages > 0)  cls += ' has-read';
        if (ds === today) cls += ' today';
        const tip = pages > 0 ? `title="${pages} sayfa okundu"` : '';
        html += `<div class="${cls}" ${tip}>${d}</div>`;
    }
    html += '</div>';
    container.innerHTML = html;
}

window.calNav = function(bookId, dir) {
    const cs = calState[bookId] || { year: new Date().getFullYear(), month: new Date().getMonth() };
    let { year, month } = cs;
    month += dir;
    if (month < 0)  { month = 11; year--; }
    if (month > 11) { month = 0;  year++; }
    renderCalendar(bookId, year, month);
};

/* ════════════════════════════════════════════════════════════
   15. PROFİL
════════════════════════════════════════════════════════════ */
function updateProfileStats() {
    document.getElementById('stat-total-books').textContent  = STATE.books.length;
    document.getElementById('stat-finished').textContent     = STATE.finishedBooks.length;
    const activePages   = STATE.books.reduce((s, b) => s + (b.pagesRead || 0), 0);
    const finishedPages = STATE.finishedBooks.reduce((s, b) => s + (b.pages || 0), 0);
    document.getElementById('stat-total-pages').textContent  = activePages + finishedPages;

    const listDiv = document.getElementById('finished-list');
    if (!listDiv) return;
    if (STATE.finishedBooks.length === 0) {
        listDiv.innerHTML = '<div class="status-msg">Henüz eklenmemiş</div>';
        return;
    }
    listDiv.innerHTML = STATE.finishedBooks.map((item, i) => `
        <div class="finished-book">
            <span>📗 ${escapeHtml(item.name)} <span style="font-size:12px;color:var(--muted)">${item.pages > 0 ? item.pages + ' sayfa' : ''}</span></span>
            <button onclick="removeFinishedBook(${i})" style="background:transparent;border:none;color:var(--danger);font-size:20px;cursor:pointer;line-height:1">✕</button>
        </div>`).join('');
}

window.removeFinishedBook = function(idx) {
    STATE.finishedBooks.splice(idx, 1);
    saveState();
    updateProfileStats();
};

/* ════════════════════════════════════════════════════════════
   16. BİTİRİLEN KİTAP — Baskı Modalı
════════════════════════════════════════════════════════════ */
async function addFinishedBook() {
    const val = (document.getElementById('finished-input').value || '').trim();
    if (!val) return;

    setLoading('fin-btn-txt', 'fin-loader', 'add-finished-btn', true);
    showStatus('fin-status', 'Baskılar aranıyor…', '');

    try {
        const editions = await fetchEditions(val);
        setLoading('fin-btn-txt', 'fin-loader', 'add-finished-btn', false);
        showFinishedModal(val, editions);
    } catch(e) {
        setLoading('fin-btn-txt', 'fin-loader', 'add-finished-btn', false);
        showStatus('fin-status', '⚠ Hata: ' + e.message, 'err');
    }
}

function showFinishedModal(bookName, editions) {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    let selIdx = -1;

    const rows = editions.map((ed, i) => `
        <button class="edition-card" data-idx="${i}">
            <div class="edition-cover">${ed.coverUrl ? `<img src="${escapeHtml(ed.coverUrl)}" onerror="this.parentElement.innerHTML='📖'">` : '📖'}</div>
            <div style="flex:1;min-width:0">
                <div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(ed.title)}</div>
                <div style="font-size:11px;color:var(--muted)">${escapeHtml(ed.author)}${ed.year ? ' · ' + ed.year : ''}</div>
                <div style="font-size:13px;font-weight:700;color:var(--accent2)">${ed.pages > 0 ? ed.pages + ' sayfa' : '? sayfa'}</div>
            </div>
            <div class="edition-radio"></div>
        </button>`).join('');

    modal.innerHTML = `
        <div class="modal-card">
            <h3 style="font-size:1.2rem;font-weight:700;margin-bottom:4px">📚 Baskı Seç</h3>
            <p style="font-size:13px;color:var(--muted);margin-bottom:14px">${escapeHtml(bookName)}</p>
            <div style="max-height:300px;overflow-y:auto">${rows || '<p style="color:var(--muted);font-size:13px">Baskı bulunamadı</p>'}</div>
            <div class="divider">veya</div>
            <div>
                <label style="font-size:13px;font-weight:500;color:var(--muted);display:block;margin-bottom:6px">✏️ Sayfa sayısını kendin gir</label>
                <input id="manualPagesFin" type="number" placeholder="Sayfa sayısı" min="1">
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
                <button id="modalFinCancel" class="btn btn-outline btn-sm">İptal</button>
                <button id="modalFinOk"     class="btn btn-primary btn-sm">Kitabı Ekle</button>
            </div>
        </div>`;
    document.body.appendChild(modal);

    modal.querySelectorAll('.edition-card').forEach(c => {
        c.addEventListener('click', () => {
            selIdx = parseInt(c.dataset.idx);
            modal.querySelectorAll('.edition-card').forEach(x => x.classList.remove('selected'));
            c.classList.add('selected');
            document.getElementById('manualPagesFin').value = '';
        });
    });

    document.getElementById('modalFinCancel').onclick = () => modal.remove();
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });

    document.getElementById('modalFinOk').onclick = () => {
        const manual = parseInt(document.getElementById('manualPagesFin').value);
        let pages = 0;
        if (!isNaN(manual) && manual > 0)  pages = manual;
        else if (selIdx >= 0)              pages = editions[selIdx]?.pages || 0;

        if (pages <= 0) {
            alert('Lütfen bir baskı seçin ya da sayfa sayısını girin.');
            return;
        }
        STATE.finishedBooks.push({ name: bookName, pages });
        saveState();
        updateProfileStats();
        modal.remove();
        document.getElementById('finished-input').value = '';
        showStatus('fin-status', `✓ "${escapeHtml(bookName)}" eklendi — ${pages} sayfa.`, 'ok');
    };

    document.getElementById('manualPagesFin')?.addEventListener('keypress', e => {
        if (e.key === 'Enter') document.getElementById('modalFinOk').click();
    });
}

document.getElementById('add-finished-btn').addEventListener('click', addFinishedBook);
document.getElementById('finished-input').addEventListener('keypress', e => { if (e.key === 'Enter') addFinishedBook(); });

/* ════════════════════════════════════════════════════════════
   17. PANEL GEÇİŞİ
════════════════════════════════════════════════════════════ */
function initTabs() {
    document.querySelectorAll('.mobile-tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const panelId = btn.dataset.panel;
            if (!panelId) return;
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
            document.querySelectorAll('.mobile-tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (panelId === 'panel-profile') { updateProfileStats(); renderProfileCharts(); }
            if (panelId !== 'panel-book-detail') {
                document.getElementById('book-detail-tab').style.display = 'none';
            }
        });
    });
}
